<style>
/* ============ DESIGN TOKENS ============ */
:root,[data-theme="dark"]{
  --bg:#020617; --bg-2:#040a1a; --surface:#0b1428; --surface-2:#0f172a; --surface-3:#16203b;
  --primary:#0F172A; --secondary:#1E3A8A; --accent:#38BDF8; --accent-2:#818cf8; --accent-3:#a78bfa; --success:#10B981;
  --accent-text:#56c6fb;
  --ink:#E7EDF5; --ink-soft:#cbd5e1; --muted:#9aa8bd; --faint:#6b7a90;
  --line:rgba(148,163,184,.14); --line-soft:rgba(148,163,184,.08);
  --glass:rgba(11,20,40,.55); --glass-2:rgba(11,20,40,.82); --glass-brd:rgba(148,163,184,.16);
  --grad:linear-gradient(100deg,#38BDF8,#818cf8 52%,#a78bfa);
  --grad-2:linear-gradient(135deg,#38BDF8,#10B981);
  --grad-3:linear-gradient(135deg,#818cf8,#a78bfa);
  --grad-text:linear-gradient(100deg,#38BDF8,#818cf8 52%,#a78bfa);
  --shadow:0 1px 2px rgba(0,0,0,.5),0 22px 60px -20px rgba(2,6,23,.9);
  --glow:0 0 0 1px rgba(56,189,248,.16),0 10px 50px -10px rgba(56,189,248,.4);
  --maxw:1200px; --r:18px; --r-sm:12px;
}
[data-theme="light"]{
  --bg:#f5f8fc; --bg-2:#eaf0f8; --surface:#ffffff; --surface-2:#f3f7fc; --surface-3:#e7eef7;
  --accent:#0ea5e9; --accent-2:#6366f1; --accent-3:#7c3aed;
  --accent-text:#0369a1;
  --ink:#0a1222; --ink-soft:#243042; --muted:#475569; --faint:#64748b;
  --line:rgba(15,23,42,.13); --line-soft:rgba(15,23,42,.07);
  --glass:rgba(255,255,255,.78); --glass-2:rgba(255,255,255,.92); --glass-brd:rgba(15,23,42,.12);
  --grad:linear-gradient(100deg,#0ea5e9,#6366f1 52%,#7c3aed);
  --grad-text:linear-gradient(100deg,#0369a1,#6d28d9);
  --shadow:0 1px 2px rgba(15,23,42,.05),0 20px 48px -22px rgba(15,23,42,.24);
  --glow:0 0 0 1px rgba(14,165,233,.22),0 12px 40px -14px rgba(14,165,233,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;line-height:1.65;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden;position:relative}
h1,h2,h3,h4,h5{font-family:"Space Grotesk","Inter",sans-serif;line-height:1.1;font-weight:600;letter-spacing:-.02em;color:var(--ink)}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
::selection{background:rgba(56,189,248,.3);color:#fff}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--accent),var(--accent-3));border-radius:9px;border:3px solid var(--bg)}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 26px}
.eyebrow{font-family:"JetBrains Mono",monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);display:inline-flex;align-items:center;gap:8px}
.eyebrow .n{background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:700}

.grad2{background:var(--grad-2);-webkit-background-clip:text;background-clip:text;color:transparent}
.section{padding:104px 0;position:relative}
.section h2{font-size:clamp(30px,4.4vw,48px);margin-top:12px;letter-spacing:-.03em;font-weight:700}

.sec-head{max-width:760px}
.hairline{height:1px;background:var(--line);border:0;margin:18px 0}
.center{text-align:center;margin-left:auto;margin-right:auto}

/* ============ AMBIENT BACKGROUND ============ */
.bgwrap{position:fixed;inset:0;z-index:-2;overflow:hidden;background:radial-gradient(120% 80% at 80% -10%,rgba(30,58,138,.26),transparent 60%),radial-gradient(90% 70% at 0% 0%,rgba(56,189,248,.1),transparent 55%),var(--bg)}
#neural{position:fixed;inset:0;z-index:-1;width:100%;height:100%;pointer-events:none;opacity:.5;transition:opacity .6s ease}
.gridfx{position:fixed;inset:0;z-index:-2;background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);background-size:54px 54px;-webkit-mask:radial-gradient(120% 90% at 50% 0%,#000,transparent 75%);mask:radial-gradient(120% 90% at 50% 0%,#000,transparent 75%);opacity:.5}
.aurora{position:fixed;inset:-15%;z-index:-2;filter:blur(80px);opacity:.32;pointer-events:none}
.aurora .blob{position:absolute;border-radius:50%;animation:float 34s ease-in-out infinite}
.b1{width:46vw;height:46vw;background:radial-gradient(circle,rgba(56,189,248,.42),transparent 65%);top:-12%;left:-8%}
.b2{width:40vw;height:40vw;background:radial-gradient(circle,rgba(167,139,250,.4),transparent 65%);top:-6%;right:-6%;animation-delay:-11s}
.b3{width:38vw;height:38vw;background:radial-gradient(circle,rgba(16,185,129,.26),transparent 65%);bottom:-14%;left:36%;animation-delay:-20s}
/* Light mode: clean academic surface — no neural, no aurora, soft scientific grid */
[data-theme="light"] #neural{display:none}
[data-theme="light"] .aurora{display:none}
[data-theme="light"] .bgwrap{background:radial-gradient(150% 100% at 50% -25%,rgba(14,165,233,.05),transparent 60%),linear-gradient(180deg,#fbfcfe,#f3f6fb)}
[data-theme="light"] .gridfx{opacity:.7;background-image:linear-gradient(rgba(15,23,42,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(15,23,42,.05) 1px,transparent 1px);background-size:46px 46px;-webkit-mask:radial-gradient(135% 100% at 50% 0%,#000,transparent 82%);mask:radial-gradient(135% 100% at 50% 0%,#000,transparent 82%)}

/* gradient TEXT darkened in light mode for legible high contrast */
[data-theme="light"] .grad,[data-theme="light"] .eyebrow .n,[data-theme="light"] .hstat b,[data-theme="light"] .metric b,[data-theme="light"] .portrait .fallback b,[data-theme="light"] .rtl-node .yr,[data-theme="light"] .chip i{background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent}

[data-theme="light"] .badge.soft{background:transparent;color:var(--muted);border-color:var(--line)}
[data-theme="light"] .area-bd .more,[data-theme="light"] .lab-info .sub,[data-theme="light"] .now-col h3,[data-theme="light"] .read-col h3,[data-theme="light"] .skill h3,[data-theme="light"] .vcard .vh,[data-theme="light"] .post .cat,[data-theme="light"] .tl-item .per,[data-theme="light"] .pub .ref,[data-theme="light"] .award .yr,[data-theme="light"] .ph .th,[data-theme="light"] .rtl-node .rc h4 .badge,[data-theme="light"] .repo .rt i,[data-theme="light"] .journey-legend .jl b,[data-theme="light"] .modal-bd h4{color:#0369a1}
[data-theme="light"] .pub .cites,[data-theme="light"] .now-list li i{color:#047857}

/* ============ PROGRESS + NAV ============ */
.progress{position:fixed;top:0;left:0;height:3px;width:0;background:var(--grad);z-index:200;box-shadow:0 0 12px rgba(56,189,248,.6)}
header.nav{position:fixed;inset:0 0 auto 0;z-index:120;transition:transform .4s cubic-bezier(.16,1,.3,1)}
header.nav .bar{display:flex;align-items:center;justify-content:space-between;gap:16px;height:72px;transition:height .35s,background .35s}
header.nav.scrolled{backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);background:var(--glass);border-bottom:1px solid var(--glass-brd)}
header.nav.scrolled .bar{height:60px}
.brand{display:flex;align-items:center;gap:11px;font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:16px}
.logo{width:36px;height:36px;border-radius:10px;background:var(--grad);color:#04111f;display:grid;place-items:center;font-family:"Space Grotesk";font-weight:700;font-size:15px;box-shadow:0 6px 20px rgba(56,189,248,.45)}
.navlinks{display:flex;align-items:center;gap:2px}
.navlinks a{padding:8px 12px;border-radius:9px;font-size:13.5px;color:var(--muted);transition:.2s;position:relative}
.navlinks a:hover{color:var(--ink);background:rgba(148,163,184,.1)}
.navtools{display:flex;align-items:center;gap:8px}
.kbd-hint{display:inline-flex;align-items:center;gap:7px;padding:8px 12px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-size:13px;cursor:pointer;transition:.2s}
.kbd-hint:hover{border-color:var(--accent);color:var(--ink)}
.kbd-hint kbd{font-family:"JetBrains Mono";font-size:11px;background:rgba(148,163,184,.16);border-radius:5px;padding:2px 6px;color:var(--ink-soft)}
.iconbtn{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--muted);display:grid;place-items:center;cursor:pointer;font-size:19px;transition:.2s}
.iconbtn:hover{color:var(--accent);border-color:var(--accent);transform:translateY(-1px)}
.btn{display:inline-flex;align-items:center;gap:8px;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:500;cursor:pointer;border:1px solid transparent;transition:.28s cubic-bezier(.16,1,.3,1);white-space:nowrap;font-family:inherit}
.btn i{font-size:18px}
.btn-accent{background:var(--grad);color:#04111f;font-weight:600;background-size:170% 170%;box-shadow:0 8px 26px rgba(56,189,248,.36)}
.btn-accent:hover{background-position:100% 50%;transform:translateY(-2px);box-shadow:0 12px 34px rgba(56,189,248,.5)}
.btn-outline{border-color:var(--glass-brd);color:var(--ink);background:var(--glass);backdrop-filter:blur(8px)}
.btn-outline:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--glow)}
.btn-ghost{color:var(--muted)}
.btn-ghost:hover{color:var(--accent)}
.menubtn{display:none}
.mobile{display:none}
.mobile.open{display:block}
.mobile{position:fixed;inset:72px 0 auto 0;z-index:110;background:var(--glass-2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--glass-brd);padding:16px 26px;max-height:80vh;overflow:auto}
.mobile a{display:block;padding:12px 8px;color:var(--ink-soft);border-radius:8px;font-size:16px}
.mobile a:hover{background:rgba(148,163,184,.1)}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}

/* ============ COMMAND PALETTE ============ */
.palette{position:fixed;inset:0;z-index:300;display:none;align-items:flex-start;justify-content:center;padding:14vh 20px 20px;background:rgba(2,6,23,.6);backdrop-filter:blur(6px)}
.palette.open{display:flex;animation:fade .2s ease}
.palette-box{width:100%;max-width:620px;background:var(--glass-2);backdrop-filter:blur(22px) saturate(160%);-webkit-backdrop-filter:blur(22px) saturate(160%);border:1px solid var(--glass-brd);border-radius:18px;box-shadow:0 30px 80px -20px rgba(0,0,0,.7);overflow:hidden;animation:pop .25s cubic-bezier(.16,1,.3,1)}
.palette-top{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
.palette-top i{font-size:20px;color:var(--accent)}
.palette-input{flex:1;background:transparent;border:0;outline:0;color:var(--ink);font-size:16px;font-family:inherit}
.palette-input::placeholder{color:var(--faint)}
.palette-esc{font-family:"JetBrains Mono";font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:3px 7px}
.palette-results{max-height:54vh;overflow:auto;padding:8px}
.palette-group{font-family:"JetBrains Mono";font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);padding:12px 12px 6px}
.palette-item{display:flex;align-items:center;gap:13px;padding:11px 13px;border-radius:11px;cursor:pointer;color:var(--ink-soft)}
.palette-item .pi{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:rgba(56,189,248,.12);color:var(--accent);font-size:18px;flex:none}
.palette-item .pt{font-size:14.5px;font-weight:500}
.palette-item .ps{font-size:12px;color:var(--muted)}
.palette-item.active,.palette-item:hover{background:rgba(56,189,248,.12)}
.palette-item .go{margin-left:auto;color:var(--faint);font-size:16px}
.palette-empty{padding:34px;text-align:center;color:var(--muted);font-size:14px}

/* ============ HERO ============ */
.hero{position:relative;padding:158px 0 64px;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1.55fr .95fr;gap:54px;align-items:center}
.statuspill{display:inline-flex;align-items:center;gap:9px;padding:7px 14px;border-radius:999px;background:var(--glass);border:1px solid var(--glass-brd);backdrop-filter:blur(8px);font-size:12.5px;color:var(--ink-soft);font-family:"JetBrains Mono"}
.statuspill .dot{width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 0 0 rgba(16,185,129,.6);animation:ping 2.4s infinite}
.hero h1{font-size:clamp(42px,6.6vw,82px);margin:18px 0 0;font-weight:700;letter-spacing:-.04em}
.hero .tag{font-family:"Space Grotesk";font-size:clamp(19px,2.5vw,28px);margin-top:16px;color:var(--ink-soft);font-weight:500}
.rotator{display:inline-block;min-width:1ch}
.hero .lead{font-size:18px;margin-top:20px;max-width:60ch}
.cta{display:flex;flex-wrap:wrap;gap:12px;margin-top:30px}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;margin-top:40px;background:var(--line);border:1px solid var(--line);border-radius:16px;overflow:hidden}
.hstat{background:var(--surface);padding:20px 16px;position:relative;overflow:hidden}
.hstat b{font-family:"Space Grotesk";font-size:clamp(26px,3.4vw,38px);font-weight:700;display:block;font-variant-numeric:tabular-nums;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent}
.hstat span{font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:3px;display:block}
.hstat .suf{font:inherit}
.portrait{position:relative}
.portrait .ring{position:absolute;inset:-16px;border-radius:28px;background:var(--grad);opacity:.45;filter:blur(26px);animation:pulse 9s ease-in-out infinite}
.portrait .frame{position:relative;aspect-ratio:4/5;border-radius:22px;overflow:hidden;border:1px solid var(--glass-brd);background:var(--surface-2);box-shadow:var(--shadow)}
.portrait .frame img{width:100%;height:100%;object-fit:cover}
.portrait .fallback{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:linear-gradient(160deg,var(--surface-3),var(--surface))}
.portrait .fallback b{font-family:"Space Grotesk";font-size:90px;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent}
.portrait .chip-float{position:absolute;background:var(--glass-2);backdrop-filter:blur(12px);border:1px solid var(--glass-brd);border-radius:13px;padding:10px 14px;box-shadow:var(--shadow);font-size:12.5px;display:flex;align-items:center;gap:9px;animation:floaty 7s ease-in-out infinite;color:var(--ink)}
.portrait .chip-float i{font-size:18px;color:var(--accent)}
.cf1{top:8%;left:-12%}.cf2{bottom:12%;right:-14%;animation-delay:-3.5s}
.scrollcue{display:flex;justify-content:center;margin-top:50px;color:var(--muted);font-size:24px;animation:bob 2.4s ease-in-out infinite}

/* ============ MARQUEE ============ */
.scroller{padding:30px 0;border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft);position:relative;overflow:hidden;background:var(--glass);backdrop-filter:blur(6px)}
.mqmask{-webkit-mask:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent);mask:linear-gradient(90deg,transparent,#000 7%,#000 93%,transparent)}
.mq{display:flex;gap:16px;width:max-content;animation:scrollx 50s linear infinite}
.mq.rev{animation-direction:reverse;margin-top:14px;animation-duration:58s}
.scroller:hover .mq{animation-play-state:paused}
.chip{display:inline-flex;align-items:center;gap:9px;padding:11px 18px;border-radius:999px;background:var(--surface);border:1px solid var(--line);font-size:14px;font-weight:500;white-space:nowrap;transition:.3s;color:var(--ink-soft)}
.chip i{font-size:18px;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent}
.chip:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:var(--glow)}

/* ============ CARDS / GRID ============ */
.grid{display:grid;gap:20px}
.cols-2{grid-template-columns:repeat(2,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-brd);border-radius:var(--r);padding:26px;transition:.4s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
.card:hover{transform:translateY(-6px);border-color:rgba(56,189,248,.4);box-shadow:var(--shadow)}
.spot{position:absolute;inset:0;opacity:0;transition:opacity .3s;background:radial-gradient(260px circle at var(--mx,50%) var(--my,50%),rgba(56,189,248,.16),transparent 70%);pointer-events:none}
.card:hover .spot{opacity:1}
.icard .ic{width:50px;height:50px;border-radius:14px;display:grid;place-items:center;font-size:25px;color:var(--accent);background:rgba(56,189,248,.12);margin-bottom:17px;transition:.35s;position:relative;z-index:1}
.icard:hover .ic{transform:scale(1.08) rotate(-5deg);background:var(--grad);color:#04111f}
.icard .num{position:absolute;top:20px;right:24px;font-family:"JetBrains Mono";font-size:13px;color:var(--faint)}
.icard h3{font-size:21px}
.icard p{color:var(--muted);font-size:14.5px;margin-top:9px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:500;background:rgba(56,189,248,.14);color:var(--accent);border:1px solid rgba(56,189,248,.26)}
.badge.soft{background:transparent;color:var(--muted);border-color:var(--line)}
.badge.ok{background:rgba(16,185,129,.14);color:var(--success);border-color:rgba(16,185,129,.3)}
.badge.warn{background:rgba(240,180,90,.14);color:#f0b45a;border-color:rgba(240,180,90,.3)}
.tags{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:15px}
.plink{font-size:13px;color:var(--muted);display:inline-flex;align-items:center;gap:4px;transition:.2s;cursor:pointer}
.plink:hover{color:var(--accent)}

/* ============ FEATURED RESEARCH ============ */
.feat{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:38px}
.feat-card{grid-column:span 1;background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-brd);border-radius:22px;overflow:hidden;transition:transform .45s cubic-bezier(.16,1,.3,1),border-color .4s,box-shadow .45s;position:relative;display:flex;flex-direction:column;cursor:pointer}
.feat-card.wide{grid-column:span 2}
.feat-card:hover{transform:translateY(-8px);border-color:rgba(56,189,248,.55);box-shadow:0 30px 60px -28px rgba(56,189,248,.5),var(--shadow)}
.feat-card:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.feat-card::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--grad);transform:scaleX(0);transform-origin:left;transition:transform .45s cubic-bezier(.16,1,.3,1);z-index:3}
.feat-card:hover::before,.feat-card:focus-visible::before{transform:scaleX(1)}
.feat-viz{height:188px;position:relative;overflow:hidden;border-bottom:1px solid var(--line);background:radial-gradient(120% 120% at 70% 0%,rgba(30,58,138,.36),var(--surface-2))}
[data-theme="light"] .feat-viz{background:radial-gradient(120% 120% at 70% 0%,rgba(14,165,233,.12),var(--surface-2))}
.feat-viz canvas{width:100%;height:100%;display:block;transition:transform .6s cubic-bezier(.16,1,.3,1)}
.feat-card:hover .feat-viz canvas{transform:scale(1.05)}
.feat-viz::after{content:"Open lab page";position:absolute;left:50%;bottom:14px;transform:translateX(-50%) translateY(10px);background:var(--glass-2);border:1px solid var(--glass-brd);color:var(--ink);font-size:11.5px;font-family:"JetBrains Mono";letter-spacing:.04em;padding:6px 13px;border-radius:999px;opacity:0;transition:.35s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(8px);pointer-events:none;white-space:nowrap;box-shadow:var(--shadow)}
.feat-card:hover .feat-viz::after,.feat-card:focus-visible .feat-viz::after{opacity:1;transform:translateX(-50%) translateY(0)}
.feat-domain{position:absolute;top:14px;left:16px;z-index:2}
.feat-num{position:absolute;top:14px;right:16px;z-index:2;font-family:"Space Grotesk";font-weight:700;font-size:30px;color:rgba(226,232,240,.16)}
[data-theme="light"] .feat-num{color:rgba(15,23,42,.14)}
.feat-body{padding:24px;display:flex;flex-direction:column;flex:1}
.feat-body h3{font-size:21px;line-height:1.22}
.feat-body .sig{color:var(--muted);font-size:14px;margin-top:11px;flex:1}
.feat-prog{margin-top:16px}
.feat-prog .lbl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);font-family:"JetBrains Mono";margin-bottom:6px}
.feat-prog .track{height:6px;border-radius:99px;background:rgba(148,163,184,.18);overflow:hidden}
.feat-prog .fill{height:100%;border-radius:99px;background:var(--grad);width:0;transition:width 1.2s cubic-bezier(.16,1,.3,1)}
.feat-foot{display:flex;align-items:center;justify-content:space-between;margin-top:18px;gap:10px}
.feat-foot .plink{font-weight:600;color:var(--accent-text)}
.feat-foot .plink i{transition:transform .3s cubic-bezier(.16,1,.3,1)}
.feat-card:hover .feat-foot .plink i{transform:translate(3px,-3px)}

/* ============ MODAL ============ */
.modal{position:fixed;inset:0;z-index:280;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(2,6,23,.66);backdrop-filter:blur(8px)}
.modal.open{display:flex;animation:fade .22s ease}
.modal-box{width:100%;max-width:760px;max-height:86vh;overflow:auto;background:var(--glass-2);backdrop-filter:blur(24px) saturate(150%);-webkit-backdrop-filter:blur(24px) saturate(150%);border:1px solid var(--glass-brd);border-radius:22px;box-shadow:0 36px 90px -24px rgba(0,0,0,.75);animation:pop .28s cubic-bezier(.16,1,.3,1)}
.modal-hd{position:sticky;top:0;background:var(--glass-2);backdrop-filter:blur(20px);padding:24px 28px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;z-index:2}
.modal-hd h3{font-size:23px;line-height:1.2}
.modal-close{flex:none;width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;display:grid;place-items:center;font-size:20px;transition:.2s}
.modal-close:hover{color:var(--accent);border-color:var(--accent)}
.modal-bd{padding:24px 28px 30px}
.modal-bd h4{font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);font-family:"JetBrains Mono";margin:20px 0 9px}
.modal-bd h4:first-child{margin-top:0}
.modal-bd p{color:var(--ink-soft);font-size:14.5px}
.modal-bd ul{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:6px}
.modal-bd li{font-size:14px;color:var(--muted);display:flex;gap:10px}
.modal-bd li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:8px;flex:none}

/* ============ VISION ============ */
.vision-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:38px}
.vcard{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-brd);border-radius:var(--r);padding:28px;position:relative;overflow:hidden;transition:.4s}
.vcard:hover{transform:translateY(-6px);box-shadow:var(--shadow);border-color:rgba(56,189,248,.4)}
.vcard .vh{font-family:"JetBrains Mono";font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
.vcard .vy{font-family:"Space Grotesk";font-size:15px;color:var(--muted);margin-top:4px}
.vcard h3{font-size:22px;margin-top:14px}
.vcard p{color:var(--muted);font-size:14.5px;margin-top:10px}
.vcard .vbar{height:5px;border-radius:99px;background:rgba(148,163,184,.16);margin-top:18px;overflow:hidden}
.vcard .vbar i{display:block;height:100%;background:var(--grad);border-radius:99px}

/* ============ RESEARCH AREAS ============ */
.areas{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:36px}
.area{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-brd);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.4s cubic-bezier(.16,1,.3,1);position:relative}
.area:hover{transform:translateY(-6px);border-color:rgba(56,189,248,.45);box-shadow:var(--shadow)}
.area:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.area-viz{height:130px;position:relative;overflow:hidden;background:radial-gradient(120% 120% at 50% 0%,rgba(30,58,138,.3),var(--surface-2));border-bottom:1px solid var(--line)}
[data-theme="light"] .area-viz{background:radial-gradient(120% 120% at 50% 0%,rgba(14,165,233,.1),var(--surface-2))}
.area-viz canvas{width:100%;height:100%;display:block}
.area-bd{padding:20px 22px 22px}
.area-bd .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:21px;color:var(--accent);background:rgba(56,189,248,.13);margin-top:-44px;position:relative;z-index:2;border:1px solid var(--glass-brd);backdrop-filter:blur(8px)}
.area-bd h3{font-size:18px;margin-top:14px}
.area-bd p{color:var(--muted);font-size:13.5px;margin-top:8px}
.area-bd .more{margin-top:14px;font-size:12.5px;color:var(--accent);display:inline-flex;align-items:center;gap:5px;font-family:"JetBrains Mono"}
.area:hover .more i{transform:translateX(3px)}
.area-bd .more i{transition:transform .3s}

/* ============ KNOWLEDGE GRAPH ============ */
.graph-wrap{position:relative;margin-top:36px;border:1px solid var(--glass-brd);border-radius:22px;overflow:hidden;background:var(--glass);backdrop-filter:blur(10px);height:520px}
#graph-canvas{width:100%;height:100%;display:block;cursor:grab}
.graph-tip{position:absolute;pointer-events:none;z-index:5;background:var(--glass-2);backdrop-filter:blur(16px);border:1px solid var(--glass-brd);border-radius:14px;padding:14px 16px;max-width:280px;box-shadow:var(--shadow);opacity:0;transition:opacity .2s;transform:translate(-50%,-115%)}
.graph-tip h4{font-size:15px}
.graph-tip p{font-size:12.5px;color:var(--muted);margin-top:6px}
.graph-tip .gt-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.graph-tip .gt-tags span{font-size:10.5px;font-family:"JetBrains Mono";color:var(--accent);background:rgba(56,189,248,.12);border-radius:5px;padding:2px 6px}
.graph-legend{position:absolute;bottom:14px;left:16px;z-index:4;display:flex;flex-wrap:wrap;gap:12px;font-size:11.5px;color:var(--ink-soft)}
.graph-legend span{display:inline-flex;align-items:center;gap:6px}
.graph-legend i{width:9px;height:9px;border-radius:50%}
.graph-hint{position:absolute;top:14px;right:16px;z-index:4;font-size:11.5px;color:var(--faint);font-family:"JetBrains Mono"}

/* ============ GENOMICS LAB ============ */
.lab{margin-top:36px;border:1px solid var(--glass-brd);border-radius:22px;overflow:hidden;background:var(--glass);backdrop-filter:blur(10px)}
.lab-tabs{display:flex;flex-wrap:wrap;gap:4px;padding:14px;border-bottom:1px solid var(--line);background:var(--surface)}
.lab-tab{padding:9px 16px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:13.5px;cursor:pointer;font-family:inherit;transition:.2s;display:inline-flex;align-items:center;gap:7px}
.lab-tab i{font-size:17px}
.lab-tab[aria-pressed="true"]{background:var(--grad);color:#04111f;font-weight:600}
.lab-stage{display:grid;grid-template-columns:1.4fr 1fr;gap:0;min-height:380px}
.lab-canvas-wrap{position:relative;border-right:1px solid var(--line);background:radial-gradient(120% 120% at 60% 0%,rgba(30,58,138,.28),var(--surface-2))}
[data-theme="light"] .lab-canvas-wrap{background:radial-gradient(120% 120% at 60% 0%,rgba(14,165,233,.1),var(--surface-2))}
.lab-canvas-wrap canvas{width:100%;height:100%;display:block;min-height:380px}
.lab-info{padding:30px}
.lab-info h3{font-size:23px}
.lab-info .sub{color:var(--accent);font-family:"JetBrains Mono";font-size:12px;text-transform:uppercase;letter-spacing:.12em;margin-top:6px}
.lab-info p{color:var(--muted);font-size:14.5px;margin-top:14px}
.lab-ctrl{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
.lab-info .facts{margin-top:20px;display:flex;flex-direction:column;gap:10px}
.lab-info .facts div{display:flex;justify-content:space-between;font-size:13px;border-bottom:1px dashed var(--line);padding-bottom:8px}
.lab-info .facts b{font-family:"JetBrains Mono";color:var(--ink)}

/* ============ PUBLICATIONS ============ */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;margin:32px 0}
.metric{background:var(--surface);padding:28px 16px;text-align:center;position:relative}
.metric b{font-family:"Space Grotesk";font-size:clamp(32px,4.4vw,46px);font-weight:700;display:block;font-variant-numeric:tabular-nums;background:var(--grad-text);-webkit-background-clip:text;background-clip:text;color:transparent}
.metric span{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:4px;display:block}
.pubtools{display:flex;flex-wrap:wrap;justify-content:space-between;gap:14px;margin-bottom:20px;align-items:center}
.search{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:9px 14px;flex:1;min-width:220px;max-width:340px}
.search i{color:var(--muted);font-size:18px}
.search input{flex:1;background:transparent;border:0;outline:0;color:var(--ink);font-size:14px;font-family:inherit}
.filters{display:flex;flex-wrap:wrap;gap:8px}
.filters button{padding:8px 15px;border-radius:999px;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:13.5px;cursor:pointer;transition:.2s;font-family:inherit}
.filters button[aria-pressed="true"]{background:var(--grad);color:#04111f;border-color:transparent;font-weight:600}
.sortsel{background:var(--surface);border:1px solid var(--line);border-radius:10px;color:var(--ink);padding:8px 12px;font-size:13.5px;font-family:inherit;cursor:pointer}
.pub{display:grid;grid-template-columns:auto 1fr;gap:20px;padding:26px;border:1px solid var(--glass-brd);border-radius:var(--r);background:var(--glass);backdrop-filter:blur(10px);margin-bottom:16px;transition:.3s}
.pub:hover{border-color:rgba(56,189,248,.42);transform:translateX(5px);box-shadow:var(--shadow)}
.pub .ref{font-family:"Space Grotesk";font-weight:700;color:var(--accent);font-size:18px}
.pub h3{font-size:19px;line-height:1.32}
.pub h3 a:hover{color:var(--accent)}
.pub .auth{color:var(--muted);font-size:14.5px;margin-top:9px}
.pub .auth b{color:var(--ink)}
.pub .ven{color:var(--muted);font-size:14px;font-style:italic;margin-top:3px}
.pub .doi{font-family:"JetBrains Mono";font-size:12px;color:var(--faint);margin-top:5px}
.pub .cites{display:inline-flex;align-items:center;gap:6px;font-family:"JetBrains Mono";font-size:12.5px;color:var(--success)}

/* ============ REPOS / DATASETS ============ */
.repo{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-brd);border-radius:var(--r);padding:24px;transition:.35s;position:relative;overflow:hidden}
.repo:hover{transform:translateY(-5px);border-color:rgba(56,189,248,.4);box-shadow:var(--shadow)}
.repo .rt{display:flex;align-items:center;gap:10px;font-family:"JetBrains Mono";font-size:15px;font-weight:600}
.repo .rt i{color:var(--accent);font-size:20px}
.repo p{color:var(--muted);font-size:13.5px;margin-top:10px}
.repo-stats{display:flex;flex-wrap:wrap;gap:16px;margin-top:16px;font-size:12.5px;color:var(--muted)}
.repo-stats span{display:inline-flex;align-items:center;gap:5px}
.repo-stats .lang{display:inline-flex;align-items:center;gap:6px}
.repo-stats .lang i{width:10px;height:10px;border-radius:50%}
.dtable{width:100%;border-collapse:separate;border-spacing:0;margin-top:34px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;font-size:14px}
.dtable th{text-align:left;font-family:"JetBrains Mono";font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:16px;background:var(--surface);border-bottom:1px solid var(--line)}
.dtable td{padding:16px;border-bottom:1px solid var(--line-soft);color:var(--ink-soft);vertical-align:top}
.dtable tr:last-child td{border-bottom:0}
.dtable tbody tr{transition:.2s}
.dtable tbody tr:hover{background:rgba(56,189,248,.05)}
.dtable .dname{font-weight:600;color:var(--ink)}
.dtable .dname small{display:block;color:var(--muted);font-weight:400;font-size:12px;margin-top:3px}

/* ============ PROJECTS ============ */
.proj{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-brd);border-radius:var(--r);overflow:hidden;transition:.4s cubic-bezier(.16,1,.3,1);position:relative;display:flex;flex-direction:column;cursor:pointer}
.proj:hover{transform:translateY(-6px);border-color:rgba(56,189,248,.42);box-shadow:var(--shadow)}
.proj:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.proj-viz{height:150px;position:relative;overflow:hidden;border-bottom:1px solid var(--line)}
.proj-viz canvas{width:100%;height:100%;display:block}
.proj-bd{padding:22px;flex:1;display:flex;flex-direction:column}
.proj-bd .top{display:flex;justify-content:space-between;align-items:center}
.proj-bd .rcode{font-family:"JetBrains Mono";font-size:12px;color:var(--accent)}
.proj-bd h3{font-size:19px;margin-top:11px}
.proj-bd p{color:var(--muted);font-size:13.5px;margin-top:9px;flex:1}
.proj-links{display:flex;flex-wrap:wrap;gap:14px;margin-top:16px}

/* ============ TIMELINE ============ */
.tl{position:relative;border-left:2px solid var(--line);padding-left:30px;margin-left:6px}
.tl-item{position:relative;padding-bottom:34px}
.tl-item:last-child{padding-bottom:0}
.tl-item .dot{position:absolute;left:-39px;top:4px;width:16px;height:16px;border-radius:50%;background:var(--grad);border:3px solid var(--bg);box-shadow:0 0 0 1px var(--line),0 0 14px rgba(56,189,248,.5)}
.tl-item .per{font-family:"JetBrains Mono";font-size:12.5px;color:var(--accent)}
.tl-item h4{font-size:18px;margin-top:6px}
.tl-item .org{font-size:14px;color:var(--ink-soft);font-weight:500;margin-top:3px}
.tl-item p{color:var(--muted);font-size:14px;margin-top:9px}

/* ============ MODERN CAREER TRAJECTORY ============ */
.trajectory{margin-top:14px}
.traj-grid{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:8px}
.traj-col{position:relative}
.traj-head{display:flex;align-items:center;gap:10px;font-family:"JetBrains Mono";font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent-text);margin-bottom:8px}
.traj-head i{font-size:18px;color:var(--accent)}
.tline{position:relative;padding-left:34px}
.tline::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:linear-gradient(180deg,var(--accent),var(--accent-3) 60%,transparent)}
.tnode{position:relative;padding:16px 0 22px;transition:.35s}
.tnode:last-child{padding-bottom:0}
.tnode .tdot{position:absolute;left:-34px;top:20px;width:20px;height:20px;border-radius:50%;background:var(--surface);border:2px solid var(--accent);display:grid;place-items:center;z-index:2;transition:.35s}
.tnode .tdot::after{content:"";width:7px;height:7px;border-radius:50%;background:var(--grad)}
.tnode.cur .tdot{box-shadow:0 0 0 4px rgba(56,189,248,.18),0 0 16px rgba(56,189,248,.5)}
.tnode .tcard{background:var(--glass);border:1px solid var(--glass-brd);border-radius:16px;padding:18px 20px;backdrop-filter:blur(8px);transition:transform .35s cubic-bezier(.16,1,.3,1),border-color .35s,box-shadow .35s}
.tnode:hover .tcard{transform:translateX(6px);border-color:rgba(56,189,248,.45);box-shadow:var(--shadow)}
.tnode:hover .tdot{transform:scale(1.12);box-shadow:0 0 0 4px rgba(56,189,248,.16),0 0 16px rgba(56,189,248,.45)}
.tnode .tper{font-family:"JetBrains Mono";font-size:12px;color:var(--accent-text);font-weight:600}
.tnode h4{font-size:17px;margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tnode .torg{font-size:13.5px;color:var(--ink-soft);font-weight:500;margin-top:3px}
.tnode p{color:var(--muted);font-size:13.5px;margin-top:9px}

/* ============ JOURNEY MAP ============ */
.journey-wrap{margin-top:30px;border:1px solid var(--glass-brd);border-radius:22px;overflow:hidden;background:var(--glass);backdrop-filter:blur(10px);position:relative}
.journey-wrap svg{width:100%;height:auto;display:block}
.journey-legend{display:flex;flex-wrap:wrap;gap:10px;padding:18px 22px;border-top:1px solid var(--line)}
.journey-legend .jl{display:inline-flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-soft);background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 14px}
.journey-legend .jl b{color:var(--accent);font-family:"JetBrains Mono";font-size:12px}

/* ============ ROADMAP ============ */
.road{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:36px}
.ph{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-brd);border-radius:var(--r);padding:22px;position:relative;transition:.4s}
.ph:hover{transform:translateY(-7px);box-shadow:var(--shadow);border-color:rgba(56,189,248,.42)}
.ph .no{width:32px;height:32px;border-radius:50%;background:rgba(56,189,248,.14);color:var(--accent);font-family:"Space Grotesk";font-weight:700;font-size:14px;display:grid;place-items:center}
.ph .yr{font-family:"JetBrains Mono";font-size:12px;color:var(--muted);margin-top:15px}
.ph h3{font-size:18px;margin-top:2px}
.ph .th{color:var(--accent);font-size:13px;font-weight:500;margin-top:3px}
.ph ul{list-style:none;margin-top:14px;display:flex;flex-direction:column;gap:9px}
.ph li{font-size:12.5px;color:var(--muted);display:flex;gap:8px;line-height:1.45}
.ph li::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:7px;flex:none}

/* ============ BLOG / READING / NOW / COLLAB ============ */
.post{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-brd);border-radius:var(--r);padding:24px;transition:.35s;cursor:pointer;position:relative;overflow:hidden;display:flex;flex-direction:column}
.post:hover{transform:translateY(-5px);border-color:rgba(56,189,248,.4);box-shadow:var(--shadow)}
.post .cat{font-family:"JetBrains Mono";font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.post h3{font-size:18px;margin-top:11px;line-height:1.28}
.post p{color:var(--muted);font-size:13.5px;margin-top:9px;flex:1}
.post .meta-row{display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-size:12px;color:var(--faint);font-family:"JetBrains Mono"}
.read-col h3{font-size:16px;color:var(--accent);display:flex;align-items:center;gap:8px}
.read-list{list-style:none;margin-top:16px;display:flex;flex-direction:column;gap:14px}
.read-item{padding-bottom:14px;border-bottom:1px dashed var(--line)}
.read-item:last-child{border-bottom:0}
.read-item b{font-size:14px;display:block}
.read-item small{color:var(--muted);font-size:12.5px}
.read-item .auth{color:var(--faint);font-size:12px;margin-top:2px;display:block}
.now-col h3{font-size:16px;color:var(--accent);display:flex;align-items:center;gap:9px}
.now-list{list-style:none;margin-top:14px;display:flex;flex-direction:column;gap:11px}
.now-list li{font-size:13.5px;color:var(--ink-soft);display:flex;gap:10px;align-items:flex-start;line-height:1.45}
.now-list li i{color:var(--accent);font-size:16px;margin-top:3px;flex:none}
.now-list li .st{font-family:"JetBrains Mono";font-size:10px;color:var(--faint);border:1px solid var(--line);border-radius:5px;padding:1px 6px;margin-left:auto;white-space:nowrap;align-self:center}
.collab{background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--glass-brd);border-radius:var(--r);padding:26px;transition:.35s}
.collab:hover{transform:translateY(-5px);border-color:rgba(56,189,248,.4);box-shadow:var(--shadow)}
.collab .ic{width:48px;height:48px;border-radius:13px;background:var(--grad);color:#04111f;display:grid;place-items:center;font-size:23px;margin-bottom:15px}
.collab h3{font-size:18px}
.collab p{color:var(--muted);font-size:13.5px;margin-top:9px}
.collab ul{list-style:none;margin-top:12px;display:flex;flex-direction:column;gap:7px}
.collab li{font-size:13px;color:var(--ink-soft);display:flex;gap:9px}
.collab li::before{content:"→";color:var(--accent);flex:none}

/* ============ SKILLS / AWARDS / CV / CONTACT ============ */
.skill h3{font-size:16px;color:var(--accent)}
.skill ul{list-style:none;margin-top:15px;display:flex;flex-direction:column;gap:11px}
.skill li{font-size:14px;color:var(--ink-soft);display:flex;gap:10px;align-items:flex-start}
.skill li::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:8px;flex:none}
.award{display:flex;gap:16px;padding:22px;border:1px solid var(--glass-brd);border-radius:var(--r);background:var(--glass);backdrop-filter:blur(8px);transition:.3s}
.award:hover{border-color:rgba(56,189,248,.4);transform:translateY(-3px);box-shadow:var(--shadow)}
.award .yr{font-family:"JetBrains Mono";font-weight:600;color:var(--accent);font-size:14px}
.award h3{font-size:15.5px;line-height:1.35}
.award p{color:var(--muted);font-size:13.5px;margin-top:6px}
.cvband{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--glass-brd);border-radius:24px;padding:46px;box-shadow:var(--shadow)}
.profiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.prof{display:flex;align-items:center;gap:12px;padding:16px;border:1px solid var(--line);border-radius:13px;background:var(--surface);transition:.3s}
.prof:hover{border-color:var(--accent);transform:translateY(-3px)}
.prof .ic{width:42px;height:42px;border-radius:11px;background:rgba(56,189,248,.13);color:var(--accent);display:grid;place-items:center;font-size:21px}
.prof small{color:var(--muted);display:block}
.gh img{width:100%;border-radius:12px;border:1px solid var(--line);background:var(--surface);padding:14px}
.contact-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ccard{display:flex;align-items:center;gap:16px;padding:24px;border:1px solid var(--glass-brd);border-radius:var(--r);background:var(--glass);backdrop-filter:blur(8px);transition:.3s}
.ccard:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--glow)}
.ccard .ic{width:50px;height:50px;border-radius:14px;background:var(--grad);color:#04111f;display:grid;place-items:center;font-size:22px}
.socials{display:flex;flex-wrap:wrap;gap:12px;margin-top:18px}
.socials a{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:14px;transition:.25s;background:var(--surface)}
.socials a:hover{color:var(--ink);border-color:var(--accent);transform:translateY(-2px)}
footer{border-top:1px solid var(--line-soft);padding:56px 0 42px;position:relative}
.foot{display:flex;flex-wrap:wrap;justify-content:space-between;gap:24px}
.foot a.fl{color:var(--muted);font-size:14px;transition:.2s;margin-right:16px}
.foot a.fl:hover{color:var(--accent)}
.foot .copy{margin-top:32px;padding-top:22px;border-top:1px solid var(--line-soft);display:flex;flex-wrap:wrap;justify-content:space-between;gap:10px;color:var(--muted);font-size:13.5px;width:100%}

/* ============ REVEAL + KEYFRAMES ============ */
.reveal{opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}
.reveal.in{opacity:1;transform:none}
.reveal.d1{transition-delay:.08s}.reveal.d2{transition-delay:.16s}.reveal.d3{transition-delay:.24s}.reveal.d4{transition-delay:.32s}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(3%,4%) scale(1.05)}66%{transform:translate(-2%,1.5%) scale(.96)}}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.6;transform:scale(1.04)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(9px)}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes scrollx{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}70%{box-shadow:0 0 0 9px rgba(16,185,129,0)}100%{box-shadow:0 0 0 0 rgba(16,185,129,0)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}

/* ============ RESPONSIVE ============ */
@media(max-width:1040px){
  .hero-grid{grid-template-columns:1fr;gap:38px}
  .portrait{max-width:340px}
  .cols-3,.cols-4{grid-template-columns:1fr 1fr}
  .areas,.vision-grid{grid-template-columns:1fr 1fr}
  .road{grid-template-columns:repeat(2,1fr)}
  .lab-stage{grid-template-columns:1fr}
  .lab-canvas-wrap{border-right:0;border-bottom:1px solid var(--line)}
  .navlinks,.kbd-hint{display:none}
  .menubtn{display:grid}
}
@media(max-width:780px){
  .traj-grid{grid-template-columns:1fr;gap:10px}
}
@media(max-width:680px){
  .section{padding:74px 0}
  .cols-2,.cols-3,.cols-4,.profiles,.contact-cards,.areas,.vision-grid{grid-template-columns:1fr}
  .feat,.feat-card.wide{grid-template-columns:1fr}
  .feat-card,.feat-card.wide{grid-column:span 1}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .road{grid-template-columns:1fr}
  .cvband{padding:28px}
  .hero-stats{grid-template-columns:1fr 1fr}
  .hide-sm{display:none}
  .pub{grid-template-columns:1fr;gap:8px}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important;scroll-behavior:auto!important}
  .reveal{opacity:1;transform:none}
  #neural,.aurora{display:none}
}
</style>
