<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Page not found · Tanvir Anjum Joarder</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Newsreader:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--accent:#0a6e5b;--ink:#15171a;--muted:#6b7280;--bg:#fafaf7;--line:#e7e5df}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
  .wrap{max-width:520px;text-align:center}
  h1{font-family:'Newsreader',Georgia,serif;font-weight:600;font-size:96px;line-height:1;color:var(--accent);margin:0 0 8px}
  h2{font-family:'Newsreader',Georgia,serif;font-weight:600;font-size:28px;margin:0 0 12px}
  p{color:var(--muted);margin:0 0 28px;line-height:1.6}
  a{display:inline-block;padding:11px 22px;border-radius:999px;background:var(--accent);color:#fff;text-decoration:none;font-weight:600;font-size:14.5px}
  a:hover{background:#085a4a}
</style>
</head>
<body>
  <div class="wrap">
    <h1>404</h1>
    <h2>This page wandered off</h2>
    <p>The page you’re looking for doesn’t exist — or has been moved. Head back to the homepage.</p>
    <a href="/">← Back to homepage</a>
  </div>
</body>
</html>
